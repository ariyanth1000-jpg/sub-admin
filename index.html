<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subadmin Login</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(135deg,#020617,#0f172a,#1e293b);
overflow:hidden;
}

body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%,rgba(255,215,0,.25),transparent 25%),
radial-gradient(circle at 80% 30%,rgba(56,189,248,.25),transparent 25%),
radial-gradient(circle at 50% 80%,rgba(34,197,94,.20),transparent 30%);
animation:bgMove 8s ease-in-out infinite alternate;
}

@keyframes bgMove{
from{transform:scale(1);}
to{transform:scale(1.1);}
}

.loginBox{
width:90%;
max-width:420px;
padding:30px;
border-radius:30px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,.15);
box-shadow:0 0 40px rgba(56,189,248,.25);
text-align:center;
position:relative;
z-index:1;
}

.logo{
width:90px;
height:90px;
margin:auto;
border-radius:50%;
background:#fff;
display:flex;
align-items:center;
justify-content:center;
font-size:35px;
font-weight:bold;
color:#2563eb;
margin-bottom:15px;
}

h1{
color:#ffd700;
font-size:28px;
margin-bottom:8px;
}

p{
color:#d1d5db;
margin-bottom:25px;
}

.inputBox{
margin-bottom:15px;
}

input{
width:100%;
padding:14px;
border:none;
outline:none;
border-radius:14px;
background:rgba(255,255,255,.10);
color:#fff;
font-size:15px;
}

input::placeholder{
color:#cbd5e1;
}

.loginBtn{
width:100%;
padding:14px;
border:none;
border-radius:14px;
cursor:pointer;
font-size:16px;
font-weight:700;
color:#fff;
background:linear-gradient(135deg,#2563eb,#22c55e);
transition:.3s;
}

.loginBtn:hover{
transform:translateY(-2px);
}

.demo{
margin-top:18px;
color:#94a3b8;
font-size:14px;
line-height:1.8;
}

.demo span{
color:#ffd700;
font-weight:bold;
}
</style>
</head>

<body>

<div class="loginBox">

<div class="logo">TA</div>

<h1>Subadmin Login</h1>
<p>Trending Academy Limited</p>

<div class="inputBox">
<input type="text" placeholder="Subadmin ID">
</div>

<div class="inputBox">
<input type="password" placeholder="Password">
</div>

<button class="loginBtn">
Login Now
</button>

<div class="demo">
<span>Demo ID:</span> subadmin01<br>
<span>Password:</span> 123456
</div>

</div>

</body>
</html>
